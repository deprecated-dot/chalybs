# Example Chalybs configuration for v0.4.0
#
# This file is intended as a realistic but minimal starting point. It shows:
# - New VmConfig layout (cpu/qemu/devices/gpu/isolation/peripherals)
# - Single-GPU safety policy
# - Per-VM isolation policy (Phase 8)
# - Extended QEMU configuration (pre_args/post_args, CPU extras, SMBIOS)

[vm.win11-gpu.cpu]
# Host CPUs reserved for the VM vCPUs (host CPU IDs).
host_cpus = "0-7,32-39"

# vCPU indices exposed to the guest.
vm_cpus   = "8-15,40-47"

[vm.win11-gpu.qemu]
binary      = "/usr/bin/qemu-system-x86_64"
rombar_off  = ["0000:0e:00.0"]
legacy_primary_gpu = false # default, can be omitted, included for completeness

# testing CPU auto detection
cpu_model = "auto"

# Arguments injected BEFORE core Chalybs-managed QEMU args.
# This is where you can set -name, debug-threads, -nodefaults, etc.
pre_args  = "-name win11-gpu,debug-threads=on -nodefaults"

# Historical "args" field (kept for existing configs).
# These are appended after the core args (cpu/machine/memory/firmware).
args      = "-display none"

# Arguments injected AFTER everything else.
# Useful for boot menu, net policy, timer policy, etc.
post_args = "-boot menu=on -net none -global kvm-pit.lost_tick_policy=discard"

num_vcpus = 16
mem_mb    = 32768
hugepages = true

ovmf_code = "/usr/share/OVMF/OVMF_CODE.fd"
ovmf_vars = "/var/lib/chalybs/win11_ovmf_vars.fd"

# RTC behavior:
#   Default: base=localtime,driftfix=slew
#   -OMit or comment out 'rtc' to get this default
#   -Set 'rtc = ""' (emtpy) to let QEMU use its own default (UTC)
#   -Set a custom string to override entirely, e.g.;
#       rtc = "base=utc,driftfix=none"
rtc       = "base=localtime,driftfix=slew"

# Optional: CPU model / hypervisor extras. If omitted, Chalybs uses:
#   -cpu host
#   ABI="EPYC-v2"
#   TOPO="pdpe1gb,+hypervisor,+invtsc,+topoext,+kvm"
#   HV_CONTEXTS="hv-stimer,hv-time,hv-synic,hv-vpindex,hv-avic"
#   VENDOR_ID="hv-vendor-id=$BASEBOARD_MANUFACTURER" (ASUSTeK)
[vm.win11-gpu.qemu.cpu_extras]
# QEMU CPU model (e.g. "EPYC-v2"); if unset, defaults to "host".
abi          = "EPYC-v2"

# Additional feature flags appended as-is.
topo         = "pdpe1gb,+hypervisor,+invtsc,+topoext,+kvm"

# Hyper-V contexts.
hv_contexts  = "hv-stimer,hv-time,hv-synic,hv-vpindex,hv-avic"

# Hypervisor vendor id fragment.
vendor_id    = "hv-vendor-id=supercool"

# Optional SMBIOS configuration (type 0/1/2).
[vm.win11-gpu.qemu.smbios]
bios_vendor             = "supercool-computer-manufacturer"
bios_version            = "9999"
bios_date               = "03/14/2024"

system_manufacturer     = "yours-truly"
system_product_name     = "fancy-box"
system_uuid             = "abcd12e3-f456-g789-0123-45h678i90123"
baseboard_manufacturer  = "supercool"
baseboard_product       = "megaboard"

[vm.win11-gpu.numa]
# Prefer placing vCPUs / IRQs on this NUMA node.
node = 1

# ----------------------------
# PCI passthrough devices
# ----------------------------
#
# Additional PCI_DEVICES and/or PCI_DEVICES_NO_ROMBAR can be added here, or under NVMe/NIC/USB as needed
# set your devices and true/false to satisfy enforcement

[[vm.win11-gpu.devices.gpu]]
pci_address = "0000:0a:00.0"
required    = true

[[vm.win11-gpu.devices.nvme]]
pci_address = "0000:0b:00.0"
required    = true

[[vm.win11-gpu.devices.nic]]
pci_address = "0000:0c:00.0"
required    = false

[[vm.win11-gpu.devices.usb]]
pci_address = "0000:0d:00.0"
requierd    = false

# ----------------------------
# GPU policy (single-GPU safety)
# ----------------------------

[vm.win11-gpu.gpu]
# If false (default), Chalybs will refuse to passthrough a GPU on a host
# that has exactly one GPU. Set to true only if you understand that the
# host display may be stolen.
allow_single_gpu = false

# Reserved for future behavior (e.g., “prefer iGPU for host display”).
force_use_igpu = false

# ----------------------------
# Device isolation policy (Phase 8)
# ----------------------------

[vm.win11-gpu.isolation]
# Overall isolation mode:
#   "disabled" - no additional checks (backwards compatible).
#   "audit"    - log isolation findings, never block startup.
#   "enforce"  - treat violations as hard errors.
mode = "audit"

# Intent hint for future policy expansions:
#   "dedicated"        - device should be dedicated to this VM.
#   "shared_with_host" - sharing is acceptable if explicitly configured.
#   "forbidden"        - passthrough not allowed by policy.
default_level = "dedicated"

# If true, any IOMMU group that contains passthrough devices must not contain
# non-passthrough members (violation: IOMMU_GROUP_NOT_EXCLUSIVE).
require_iommu_exclusive = true

# If true, multi-function PCI devices (same domain/bus/slot, different
# function) should be treated as a unit. Mixing host-owned and passthrough
# functions is flagged as a violation.
require_multifunction_consistency = true

# If true, passthrough from an IOMMU group that also contains a host-owned
# GPU (amdgpu/nvidia/nouveau) is treated as a violation.
forbid_host_critical_in_group = true

# ----------------------------
# Peripherals (optional)
# ----------------------------

[vm.win11-gpu.peripherals.tasmota]
mqtt_host   = "url-or-ip:port"
username    = "!changeme!"
password    = "!changeme!"
device_id   = "tasmotaID_123456"

[vm.win11-gpu.peripherals.ddc]
monitor_i2c_bus = 4
vm_input        = 2
host_input      = 1

[vm.win11-gpu.peripherals.looking_glass]
shm_name = "looking-glass"

[vm.win11-gpu.peripherals.spice]
enabled = true
port = 5900
addr = "127.0.0.1"

# ----------------------------
# Global logging
# ----------------------------

[logging]
level  = "info"   # "trace" | "debug" | "info" | "warn" | "error"
format = "pretty" # "pretty" | "json"
